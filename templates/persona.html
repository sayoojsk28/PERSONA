<!DOCTYPE html>
<html>
<head>
    <title>Persona Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/persona.css') }}">
</head>

<body>

<div class="chat-container">

    <h2>🎭 Tune Your AI Friend</h2>

    <p>Adjust how your AI behaves</p>

    <label>Empathy Level</label>
    <input type="range" min="1" max="10">

    <label>Humor Level</label>
    <input type="range" min="1" max="10">

    <label>Talk Style</label>
    <select>
        <option>Deep</option>
        <option>Casual</option>
        <option>Balanced</option>
    </select>

    <button>Save Preferences</button>

</div>

</body>
</html>
