<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Questionnaire</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="{{ url_for('static', filename='questionnaire/css/questionnaire.css') }}">

</head>


<body>


    <!-- Background Video -->

    <video autoplay muted loop playsinline class="background-video">

        <source src="{{ url_for('static', filename='home/video/home.mp4') }}" type="video/mp4">

    </video>


    <!-- Dark Overlay -->

    <div class="video-overlay"></div>



    <div class="question-card">


        <h3 id="progress-text"></h3>


        <div class="progress">

            <div class="progress-fill" id="progress-fill"></div>

        </div>



        <img id="question-image" class="question-image" alt="Question image">



        <h2 id="question"></h2>



        <div class="options" id="options"></div>



        <div class="buttons">

            <button class="btn" id="prevBtn">
                Previous
            </button>


            <button class="btn primary" id="nextBtn">
                Next
            </button>

        </div>



    </div>



    <script src="{{ url_for('static', filename='js/script.js') }}"></script>


</body>

</html>
